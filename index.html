<!DOCTYPE html>
<html lang="de">
  <head>
    <link rel="stylesheet" href="./css/consent.css" />
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-DKK7DGE8ED"
    ></script>
    <script src="./js/gtag-init.js"></script>
    <script src="./js/consent.js" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Surfmate is a surf platform to manage spots, share spotchecks with friends, discover events, and connect with others."
    />
    <meta
      name="keywords"
      content="surf, surf platform, surf app, surfmate, surf spots, spotchecks, surf journal, surf journey, surf events, surf calendar, surf meetups"
    />
    <title>
      Surfmate – Your Surf. Your Story.
    </title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/download-banner.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./css/waiting-section.css" />
    <link rel="stylesheet" href="./css/jolie-bast-section.css" />
    <link rel="stylesheet" href="./css/surfskate-section.css" />
    <!-- Favicon (später hinzufügen) -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />

    <!-- Open Graph Meta Tags für Social Media -->
    <meta
      property="og:title"
      content="Surfmate – Your Surf. Your Story."
    />
    <meta
      property="og:description"
      content="Surfmate is a surf platform to manage spots, share spotchecks with friends, discover events, and connect with others."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://surfmate.eu" />
  </head>
  <body>
    <!-- Header -->
    <div data-include="header.html"></div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Hero Section -->
      <div data-include="hero.html"></div>

      <!-- Upcoming Events -->
      <div data-include="upcoming-events-section.html"></div>

      <!-- Features Carousel -->
      <div data-include="features-carousel-section.html"></div>

      <!-- Story Section -->
      <div data-include="story.html"></div>

      <aside
        id="home-download-banner"
        class="download-banner download-banner--home"
        aria-label="Download Surfmate"
        hidden
      >
        <div class="download-banner-inner">
          <p class="download-banner-label">Download now</p>
          <div class="download-banner-stores">
            <a
              href="https://apps.apple.com/de/app/surfmate-surf-log-connect/id6760191082"
              class="download-store-badge"
              data-hero-store="app-store"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                src="assets/Download_on_the_App_Store_Badge_US-UK_RGB_blk_092917.svg"
                alt="Download on the App Store"
                width="120"
                height="40"
              />
            </a>
            <a
              href="https://play.google.com/store/apps/details?id=com.joliebast.surfmateapp&pcampaignid=web_share"
              class="download-store-badge"
              data-hero-store="play-store"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                src="assets/GetItOnGooglePlay_Badge_Web_color_English.svg"
                alt="Get it on Google Play"
                width="135"
                height="40"
              />
            </a>
          </div>
        </div>
      </aside>

      <!-- About Section -->
      <div data-include="about.html"></div>


      <!-- Waiting Section -->
      <div data-include="waiting-section.html"></div>

      <!-- Support Section -->
      <div data-include="support.html"></div>


      <!-- Jolie Bast Image -->
      <div data-include="jolie-bast-section.html"></div>

      <!-- Newsletter Section -->
      <div data-include="waitlist.html"></div>

      <!-- Surfskate Image -->
      <div data-include="surfskate-section.html"></div>

      <!-- Q&A Section -->
      <div data-include="faq.html"></div>
    </main>

    <!-- Footer -->
    <div data-include="footer.html"></div>

    <!-- JavaScript -->
    <script>
      // Globaler Error Handler für besseres Debugging
      window.addEventListener("error", (e) => {
        console.log("🔴 JavaScript Error:", e.error);
      });

      window.addEventListener("unhandledrejection", (e) => {
        console.log("🔴 Unhandled Promise Rejection:", e.reason);
        // Verhindere dass der Fehler in der Console erscheint
        e.preventDefault();
      });
    </script>
    <script src="./js/includes.js"></script>
    <script src="./js/supabase-config.js"></script>
    <script type="module" src="./js/home-upcoming-events.js"></script>
    <script src="./js/waitlist.js"></script>
    <script src="./js/wave-animation.js"></script>
    <script src="./js/navigation.js"></script>
    <script src="js/custom-scrollbar.js"></script>
    <script src="./js/faq.js"></script>
    <script src="./js/story-journey.js"></script>
  </body>
</html>
