<!DOCTYPE html>
<html lang="de">
  <head>
    <link rel="stylesheet" href="./css/consent.css" />
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-DKK7DGE8ED"
    ></script>
    <script src="./js/gtag-init.js"></script>
    <script src="./js/consent.js" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Surfmate is a  surf platform to manage spots, share spotchecks with friends, and capture your surf journey."
    />
    <meta
      name="keywords"
      content="surf, surf platform, surf app, surfmate, surf spots, spotchecks, surf journal, surf journey"
    />
    <title>
      Surfmate – Your Surf. Your Story.
    </title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/waiting-section.css" />
    <!-- Favicon (später hinzufügen) -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

    <!-- Open Graph Meta Tags für Social Media -->
    <meta
      property="og:title"
      content="SurfMate – Your Surf. Your Story."
    />
    <meta
      property="og:description"
      content="SurfMate is a new surf platform to manage spots, share spotchecks with friends, and capture your surf journey."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://surfmate.de" />
  </head>
  <body>
    <!-- Header -->
    <div data-include="header.html"></div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Hero Section -->
      <div data-include="hero.html"></div>

      <!-- About Section -->
      <div data-include="about.html"></div>

      <!-- Logo Animation Section -->
      <div data-include="logo-animation.html"></div>

      <!-- Waitlist Section -->
      <div data-include="waitlist.html"></div>

      <!-- Waiting Section -->
      <div data-include="waiting-section.html"></div>
    </main>

    <!-- Footer -->
    <div data-include="footer.html"></div>

    <!-- JavaScript -->
    <script>
      // Globaler Error Handler für besseres Debugging
      window.addEventListener("error", (e) => {
        console.log("🔴 JavaScript Error:", e.error);
      });

      window.addEventListener("unhandledrejection", (e) => {
        console.log("🔴 Unhandled Promise Rejection:", e.reason);
        // Verhindere dass der Fehler in der Console erscheint
        e.preventDefault();
      });
    </script>
    <script src="./js/includes.js"></script>
    <script src="./js/waitlist.js"></script>
    <script src="./js/wave-animation.js"></script>
    <script src="./js/navigation.js"></script>
    <script src="js/custom-scrollbar.js"></script>
  </body>
</html>
