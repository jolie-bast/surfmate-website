<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="./css/consent.css" />
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-DKK7DGE8ED"
    ></script>
    <script src="./js/gtag-init.js"></script>
    <script src="./js/consent.js" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Meet the Surfmate team — founder, marketing, and surf data."
    />
    <title>Team – Surfmate</title>

    <link rel="stylesheet" href="./css/main.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./css/team.css" />

    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  </head>
  <body class="team-page">
    <div data-include="header.html"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        let attempts = 0;
        const maxAttempts = 10;

        const makeHeaderBlack = () => {
          attempts++;
          const header = document.querySelector(".header");

          if (header) {
            header.classList.add("scrolled");
            header.style.background = "rgba(0, 0, 0, 0.95)";
            header.style.backdropFilter = "blur(10px)";
          } else if (attempts < maxAttempts) {
            setTimeout(makeHeaderBlack, 300);
          }
        };

        makeHeaderBlack();
      });
    </script>

    <main class="team-main">
      <section class="team-hero" aria-labelledby="team-heading">
        <div class="team-hero-inner">
          <h1 id="team-heading" class="team-hero-title team-reveal" data-team-reveal="hero-1">
            The Team
          </h1>
          <p class="team-hero-subline team-reveal" data-team-reveal="hero-2">
            Surf-Nerds, Marketers and Passionates behind the platform.
          </p>
        </div>
      </section>

      <section class="team-grid-section" aria-label="Team members">
        <div class="team-grid">
          <article class="team-card team-reveal" data-team-reveal="card-0">
            <div class="team-card-media">
              <img
                src="./assets/founder-shooting/surfmate-jolie-surf-portrait.avif"
                alt="Jolie Bast"
                class="team-card-photo"
                width="800"
                height="1000"
                loading="eager"
              />
              <a
                href="https://giuliamuskatphoto.wixsite.com/photography"
                class="team-photo-credit"
                target="_blank"
                rel="noopener noreferrer"
                >@ Giulia Muskat</a
              >
            </div>
            <div class="team-card-body">
              <h2 class="team-card-name">Jolie Bast</h2>
              <p class="team-card-role">Founder &amp; Developer</p>
              <a
                href="https://www.linkedin.com/in/jolie-bast-859b802a3/"
                class="team-card-link"
                target="_blank"
                rel="noopener noreferrer"
              >
                <i class="bi bi-linkedin" aria-hidden="true"></i>
                <span>LinkedIn</span>
                <i class="bi bi-arrow-right team-card-link-arrow" aria-hidden="true"></i>
              </a>
            </div>
          </article>

          <article class="team-card team-reveal" data-team-reveal="card-1">
            <div class="team-card-media">
              <img
                src="./assets/surfmate-hannah-henneberg-marketing.jpg"
                alt="Hannah Henneberg"
                class="team-card-photo"
                width="600"
                height="750"
                loading="lazy"
              />
            </div>
            <div class="team-card-body">
              <h2 class="team-card-name">Hannah Henneberg</h2>
              <p class="team-card-role">Marketing</p>
              <a
                href="https://www.linkedin.com/in/hannah-henneberg-92abb537a/"
                class="team-card-link"
                target="_blank"
                rel="noopener noreferrer"
              >
                <i class="bi bi-linkedin" aria-hidden="true"></i>
                <span>LinkedIn</span>
                <i class="bi bi-arrow-right team-card-link-arrow" aria-hidden="true"></i>
              </a>
            </div>
          </article>

          <article class="team-card team-reveal" data-team-reveal="card-2">
            <div class="team-card-media">
              <div class="team-photo-placeholder" aria-hidden="true">
                <span class="team-photo-placeholder-initials">NL</span>
              </div>
            </div>
            <div class="team-card-body">
              <h2 class="team-card-name">Nikolaus Lieberum</h2>
              <p class="team-card-role">IT Support · Surf Data</p>
              <a
                href="https://www.linkedin.com/in/nikolaus-lieberum/"
                class="team-card-link"
                target="_blank"
                rel="noopener noreferrer"
              >
                <i class="bi bi-linkedin" aria-hidden="true"></i>
                <span>LinkedIn</span>
                <i class="bi bi-arrow-right team-card-link-arrow" aria-hidden="true"></i>
              </a>
            </div>
          </article>
        </div>
      </section>
    </main>

    <div data-include="footer.html"></div>

    <script src="./js/includes.js"></script>
    <script src="./js/navigation.js"></script>
    <script src="./js/team.js" defer></script>
  </body>
</html>
