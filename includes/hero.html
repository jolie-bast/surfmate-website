<!-- Hero Section -->
<section class="hero">
  <!-- Hintergrund Bild -->
  <div class="hero-image">
    <img
      src="./assets/surfmate-beginning.avif"
      alt="Surferin mit Brett bei Sonnenuntergang"
      class="hero-bg-img"
    />
  </div>

  <div class="container">
    <div class="hero-content">
      <h1
        class="hero-title"
        data-typewriter-title
        data-text="Your Surf. Your Story."
        aria-label="Your Surf. Your Story."
      ></h1>
      <p
        class="hero-subtitle hero-subtitle-hidden"
        data-typewriter-subtitle
        data-text="The platform for your surf journey."
      ></p>
      <a
        href="#waitlist"
        class="hero-cta-button hero-cta-hidden"
        data-typewriter-cta
        data-text="Pre-order now on the App Store"
        >Pre-order now on the App Store</a
      >
    </div>
  </div>
</section>
