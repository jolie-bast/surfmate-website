<!-- Newsletter Section -->
<section id="newsletter" class="waitlist">
  <div class="container">
    <div class="waitlist-content">
      <h2 class="waitlist-title">Newsletter</h2>
      <p class="waitlist-description">
        Stay in the loop — surf stories, updates, and what&apos;s new at Surfmate.
      </p>

      <!-- Newsletter Form -->
      <div class="waitlist-form" style="position: relative;">
        <form id="waitlist-form" class="custom-waitlist-form" method="post" action="javascript:void(0)" style="transition: opacity 0.3s ease;">
          <div class="form-row">
            <input
              type="email"
              id="waitlist-email"
              name="email"
              placeholder="Your Email Address"
              autocomplete="email"
              required
            />
            <button type="submit" id="waitlist-submit">Subscribe</button>
          </div>
          <div id="error-message" class="error-message" style="display: none;"></div>
        </form>

        <!-- Success Message -->
        <div id="success-message" class="success-message" style="display: none; position: absolute; top: -50px; left: 0; width: 100%; opacity: 0; transition: opacity 0.5s ease;">
          <p><strong>You&apos;re subscribed!</strong></p>
          <p>Thanks for joining the Surfmate newsletter. We&apos;ll keep you posted.</p>
        </div>
      </div>

      </div>
    </div>
  </div>
</section>
