<section
  class="upcoming-events-section"
  id="upcoming-events"
  aria-labelledby="upcoming-events-title"
>
  <div class="container">
    <div class="upcoming-events-header">
      <h2 id="upcoming-events-title" class="upcoming-events-title">Upcoming events</h2>
      <p class="upcoming-events-lead">
        Contests, festivals and meetups — a preview of what's coming up next.
      </p>
    </div>

    <div id="upcoming-events-loading" class="upcoming-events-loading" role="status">
      <span class="upcoming-events-spinner" aria-hidden="true"></span>
      Loading events…
    </div>

    <div id="upcoming-events-error" class="upcoming-events-error" role="alert" hidden></div>

    <div class="upcoming-events-preview" id="upcoming-events-preview" hidden>
      <div id="upcoming-events-grid" class="events-list-grid upcoming-events-grid"></div>
      <div class="upcoming-events-fade" aria-hidden="true"></div>
    </div>

    <p id="upcoming-events-empty" class="upcoming-events-empty" hidden>
      No upcoming events right now — check back soon or share one with us.
    </p>

    <div class="upcoming-events-footer">
      <a href="/events/" class="upcoming-events-discover-btn" id="upcoming-events-discover">
        Discover <span class="upcoming-events-count" id="upcoming-events-count">…</span> listed surf events
        <i class="bi bi-arrow-right" aria-hidden="true"></i>
      </a>
    </div>
  </div>
</section>
