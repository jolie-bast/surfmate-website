<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Surfmate – Email confirmed</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #111827;
      background: #ffffff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 12px;
    }
    p {
      margin: 0 0 16px;
      color: #4b5563;
    }
    a.button,
    span.button {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 18px;
      border-radius: 12px;
      background: #111827;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }
    span.button-static {
      cursor: default;
      user-select: none;
    }
    .muted {
      font-size: 0.9rem;
    }
    .error {
      color: #b91c1c;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      margin-right: 6px;
      vertical-align: -3px;
      border: 2px solid rgba(17, 24, 39, 0.15);
      border-top-color: #111827;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main id="main">
    <h1>Email confirmed</h1>
    <p class="muted"><span class="spinner" aria-hidden="true"></span>Preparing next step…</p>
  </main>
  <script>
    (function () {
      var main = document.getElementById("main");
      var hash = window.location.hash.charAt(0) === "#" ? window.location.hash.slice(1) : "";
      var params = new URLSearchParams(hash);
      var query = new URLSearchParams(window.location.search);

      var accessToken = params.get("access_token");
      var refreshToken = params.get("refresh_token");
      var error = params.get("error") || query.get("error");
      var errorDescription =
        params.get("error_description") || query.get("error_description");

      /** Opens the app sign-in screen (email + password). */
      var signInDeepLink = "surfmate://auth/email-sign-in";
      /** Forwards session tokens so the app can finish signup / magic link without retyping password. */
      var appCallbackDeepLink = "surfmate://auth/callback" + (hash ? "#" + hash : "");
      var confirmedButtonDelayMs = 2800;

      function isMobileUa() {
        return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent || "");
      }

      function render(title, bodyHtml, buttonHref, buttonLabel) {
        main.innerHTML =
          "<h1>" + title + "</h1>" +
          bodyHtml +
          (buttonHref
            ? '<p><a class="button" href="' +
              buttonHref +
              '">' +
              buttonLabel +
              "</a></p>"
            : "");
      }

      function renderConfirmedWaiting() {
        var mobile = isMobileUa();
        render(
          "Email confirmed",
          '<p>Your email address is confirmed.</p>' +
            '<p class="muted">' +
            (mobile
              ? '<span class="spinner" aria-hidden="true"></span>Opening Surfmate…'
              : '<span class="spinner" aria-hidden="true"></span>Almost ready…') +
            "</p>",
          null,
          null
        );
      }

      function renderConfirmedReady() {
        var mobile = isMobileUa();
        if (mobile) {
          render(
            "Email confirmed",
            '<p>Your email address is confirmed.</p>' +
              '<p class="muted">Tap below to open Surfmate and sign in with your email and password.</p>',
            signInDeepLink,
            "Continue to sign in"
          );
          return;
        }

        render(
          "Email confirmed",
          '<p>Your email address is confirmed.</p>' +
            '<p class="muted">Open Surfmate on your phone and sign in with the same email and password.</p>' +
            '<p><span class="button button-static" role="status">Confirmed</span></p>',
          null,
          null
        );
      }

      function scheduleConfirmedButton() {
        setTimeout(renderConfirmedReady, confirmedButtonDelayMs);
      }

      if (error) {
        render(
          "Link not valid",
          '<p class="error">' +
            (errorDescription || error) +
            "</p><p class=\"muted\">Request a new confirmation email from the Surfmate app.</p>",
          null,
          null
        );
        return;
      }

      if (accessToken && refreshToken) {
        renderConfirmedWaiting();

        if (isMobileUa()) {
          // Best effort: log in inside the app with the tokens from the email link.
          window.location.replace(appCallbackDeepLink);
        }

        scheduleConfirmedButton();
        return;
      }

      render(
        "Email confirmed",
        "<p>Your confirmation link was processed.</p>" +
          '<p class="muted"><span class="spinner" aria-hidden="true"></span>Preparing next step…</p>',
        null,
        null
      );
      setTimeout(function () {
        if (isMobileUa()) {
          render(
            "Email confirmed",
            "<p>Your confirmation link was processed.</p>" +
              '<p class="muted">Open Surfmate and sign in with your email and password.</p>',
            signInDeepLink,
            "Continue to sign in"
          );
          return;
        }

        render(
          "Email confirmed",
          "<p>Your confirmation link was processed.</p>" +
            '<p class="muted">Open Surfmate on your phone and sign in with your email and password.</p>' +
            '<p><span class="button button-static" role="status">Confirmed</span></p>',
          null,
          null
        );
      }, confirmedButtonDelayMs);
    })();
  </script>
</body>
</html>
