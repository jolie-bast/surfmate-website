<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Surfmate – Sign in</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #111827;
      background: #ffffff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 12px;
    }
    p {
      margin: 0 0 16px;
      color: #4b5563;
    }
    a.button {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 18px;
      border-radius: 12px;
      background: #111827;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }
    .muted {
      font-size: 0.9rem;
    }
    .error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <main id="main">
    <h1>Opening Surfmate…</h1>
    <p class="muted">If nothing happens, use the button below.</p>
    <p id="actions"></p>
  </main>
  <script>
    (function () {
      var main = document.getElementById("main");
      var actions = document.getElementById("actions");
      var hash = window.location.hash.charAt(0) === "#" ? window.location.hash.slice(1) : "";
      var params = new URLSearchParams(hash);
      var query = new URLSearchParams(window.location.search);

      var accessToken = params.get("access_token");
      var refreshToken = params.get("refresh_token");
      var type = params.get("type") || query.get("type") || "signup";
      var error = params.get("error") || query.get("error");
      var errorDescription =
        params.get("error_description") || query.get("error_description");

      var appDeepLink = "surfmate://auth/callback" + (hash ? "#" + hash : "");

      function isMobileUa() {
        return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent || "");
      }

      function render(title, bodyHtml, buttonHref, buttonLabel) {
        main.innerHTML =
          "<h1>" + title + "</h1>" +
          bodyHtml +
          (buttonHref
            ? '<p id="actions"><a class="button" href="' +
              buttonHref +
              '">' +
              buttonLabel +
              "</a></p>"
            : "");
      }

      if (error) {
        render(
          "Link not valid",
          '<p class="error">' +
            (errorDescription || error) +
            "</p><p class=\"muted\">Request a new confirmation email from the Surfmate app.</p>",
          null,
          null
        );
        return;
      }

      if (accessToken && refreshToken) {
        if (isMobileUa()) {
          window.location.replace(appDeepLink);
          setTimeout(function () {
            render(
              "Email confirmed",
              "<p>Your email is confirmed. Open Surfmate to continue.</p>",
              appDeepLink,
              "Open Surfmate"
            );
          }, 1200);
          return;
        }

        render(
          "Email confirmed",
          "<p>Your email address is confirmed.</p>" +
            "<p class=\"muted\">Open Surfmate on your phone and sign in with the same email and password.</p>",
          appDeepLink,
          "Open Surfmate on this device"
        );
        return;
      }

      render(
        "Email confirmed",
        "<p>Your confirmation link was processed.</p>" +
          "<p class=\"muted\">Open Surfmate and sign in with your email and password.</p>",
        "https://surfmate.eu",
        "Go to surfmate.eu"
      );
    })();
  </script>
</body>
</html>
