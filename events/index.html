<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/css/consent.css" />
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-DKK7DGE8ED"
    ></script>
    <script src="/js/gtag-init.js"></script>
    <script src="/js/consent.js" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Surf events on Surfmate — contests, festivals, meetups and tours in list, calendar and map view."
    />
    <title>Surf events – Surfmate</title>
    <link rel="canonical" href="https://surfmate.eu/events/" />

    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/download-banner.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/events.css" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  </head>
  <body class="events-page">
    <div data-include="header.html"></div>

    <aside class="download-banner is-visible is-immediate" aria-label="Download Surfmate">
      <div class="download-banner-inner">
        <p class="download-banner-label">Download now</p>
        <div class="download-banner-stores">
          <a
            href="https://apps.apple.com/de/app/surfmate-surf-log-connect/id6760191082"
            class="download-store-badge"
            data-hero-store="app-store"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="/assets/Download_on_the_App_Store_Badge_US-UK_RGB_blk_092917.svg"
              alt="Download on the App Store"
              width="120"
              height="40"
            />
          </a>
          <a
            href="https://play.google.com/store/apps/details?id=com.joliebast.surfmateapp&pcampaignid=web_share"
            class="download-store-badge"
            data-hero-store="play-store"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="/assets/GetItOnGooglePlay_Badge_Web_color_English.svg"
              alt="Get it on Google Play"
              width="135"
              height="40"
            />
          </a>
        </div>
      </div>
    </aside>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        let attempts = 0;
        const maxAttempts = 10;

        const makeHeaderDark = () => {
          attempts++;
          const header = document.querySelector(".header");
          if (header) {
            header.classList.add("scrolled");
            header.style.background = "rgba(0, 0, 0, 0.95)";
            header.style.backdropFilter = "blur(10px)";
          } else if (attempts < maxAttempts) {
            setTimeout(makeHeaderDark, 300);
          }
        };

        makeHeaderDark();
      });
    </script>

    <main class="events-main">
      <section class="events-hero" aria-labelledby="events-heading">
        <div class="events-hero-media">
          <img
            src="/assets/surfmate-kirsten-frank-loggertour.avif"
            alt=""
            class="events-hero-img"
            width="2400"
            height="1350"
            fetchpriority="high"
            decoding="async"
          />
          <a
            href="https://kirstenfrank.myportfolio.com/"
            class="events-hero-photo-credit"
            target="_blank"
            rel="noopener noreferrer"
            >@ Kirsten Frank</a
          >
        </div>
        <div class="events-hero-inner">
          <h1 id="events-heading" class="events-hero-title">Surf events</h1>
          <p class="events-hero-subline">
            Contests, festivals and meetups worldwide, compact.
          </p>
        </div>
      </section>

      <section class="events-toolbar-section" aria-label="Event filters">
        <div class="events-section-inner">
          <div class="events-toolbar">
            <label class="events-search-wrap">
              <span class="visually-hidden">Search events</span>
              <i class="bi bi-search events-search-icon" aria-hidden="true"></i>
              <input
                id="events-search"
                class="events-search-input"
                type="search"
                placeholder="Search events…"
                autocomplete="off"
                enterkeyhint="search"
              />
            </label>

            <div
              id="events-view-toggle"
              class="events-view-toggle"
              role="tablist"
              aria-label="View mode"
            >
              <button type="button" class="events-view-btn is-active" data-view="list" role="tab" aria-selected="true">
                <i class="bi bi-list-ul" aria-hidden="true"></i> List
              </button>
              <button type="button" class="events-view-btn" data-view="calendar" role="tab" aria-selected="false">
                <i class="bi bi-calendar3" aria-hidden="true"></i> Calendar
              </button>
            </div>
          </div>

          <div id="events-filter-chips" class="events-filter-chips" aria-label="Event type filters"></div>

          <div id="events-loading" class="events-loading" role="status">
            <span class="events-spinner" aria-hidden="true"></span>
            Loading events…
          </div>

          <div id="events-error" class="events-error" role="alert" hidden></div>
          <div id="events-status" class="events-status" role="status" aria-live="polite" hidden></div>
        </div>
      </section>

      <section class="events-split-section" aria-label="Events discovery">
        <div class="events-section-inner">
          <div id="events-split-layout" class="events-split-layout">
            <div class="events-split-main">
              <div
                id="events-list-section"
                class="events-list-panel"
                aria-label="Event list"
              >
                <div id="events-list-grid" class="events-list-grid"></div>
                <div id="events-list-sentinel" class="events-list-sentinel" hidden></div>
              </div>

              <div
                id="events-calendar-section"
                class="events-calendar-panel"
                aria-label="Event calendar"
                hidden
              >
                <div id="events-calendar" class="events-calendar"></div>
                <div id="events-calendar-day-list" class="events-calendar-day-list"></div>
                <div id="events-calendar-sentinel" class="events-list-sentinel" hidden></div>
              </div>
            </div>

            <aside class="events-split-map" aria-label="Event map">
              <button
                type="button"
                id="events-map-back"
                class="events-map-back"
                hidden
                aria-label="Back to events"
              >
                <i class="bi bi-arrow-left" aria-hidden="true"></i>
                <span>Back</span>
              </button>
              <div id="events-map-status" class="events-status" role="status" aria-live="polite" hidden></div>
              <div id="events-map" class="events-map" role="region" aria-label="Event locations map"></div>
              <div id="events-mobile-strip" class="events-mobile-strip" hidden>
                <p id="events-mobile-strip-label" class="events-mobile-strip-label">Nearby events</p>
                <div
                  id="events-mobile-strip-scroll"
                  class="events-mobile-strip-scroll"
                  role="list"
                  aria-label="Events in map view"
                ></div>
              </div>
            </aside>
          </div>
        </div>
      </section>

      <section class="events-cta-section" aria-labelledby="events-cta-title">
        <div class="events-section-inner">
          <div class="events-cta">
            <h2 id="events-cta-title" class="events-cta-title">Know an event?</h2>
            <p class="events-cta-text">
              <a href="/events/submit/" class="events-cta-link">Share it with the community</a>
            </p>
          </div>
        </div>
      </section>
    </main>

    <a href="/events/submit/" class="events-share-fab">
      <span class="events-share-fab-text">Share an event with the community?</span>
      <i class="bi bi-arrow-right-short events-share-fab-icon" aria-hidden="true"></i>
    </a>

    <div data-include="footer.html"></div>

    <script src="/js/includes.js"></script>
    <script src="/js/navigation.js"></script>
    <script src="/js/supabase-config.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/js/events.js"></script>
  </body>
</html>
